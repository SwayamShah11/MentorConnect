{% extends "mentor/base1.html" %}
{% load static %}

{% block title %}Registration Successful{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0 p-0">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Account Created</h4>
        </div>
        <div class="card-body">
          <p class="mb-3">Your account has been created successfully. Please log in to continue.</p>
          <a href="{{ login_url }}" class="btn btn-primary">Go to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
