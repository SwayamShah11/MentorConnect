<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorConnect OTP</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Segoe UI,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#0f172a;border-radius:14px;border:1px solid #1e3a8a;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#020617,#1e293b);padding:20px;color:#e2e8f0;font-size:20px;font-weight:700;">
              MentorConnect
            </td>
          </tr>
          <tr>
            <td style="padding:24px;color:#e5e7eb;">
              <p style="margin:0 0 12px;">Hello {{ username }},</p>
              <p style="margin:0 0 16px;">Use this OTP to complete your login to {{ portal_label }}:</p>

              <div style="margin:0 0 20px;padding:14px;border-radius:10px;background:#020617;border:1px solid #3b82f6;color:#60a5fa;font-size:30px;font-weight:700;letter-spacing:.35em;text-align:center;">
                {{ otp }}
              </div>

              <p style="margin:0 0 16px;">This OTP will expire in {{ expiry_minutes }} minutes.</p>

              {% if verify_url %}
              <p style="margin:0 0 18px;">
                <a href="{{ verify_url }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:999px;font-weight:600;">
                  Open OTP Verification
                </a>
              </p>
              {% endif %}

              <p style="margin:0;color:#94a3b8;font-size:13px;">
                If you did not request this OTP, secure your account password immediately.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
